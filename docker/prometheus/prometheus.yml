global:
    scrape_interval: 15s
    evaluation_interval: 15s

scrape_configs:
    - job_name: symfony
      static_configs:
          - targets: ['php:9001']    # endpoint /metrics exposed by the app
      metrics_path: /metrics

    - job_name: rabbitmq
      static_configs:
          - targets: ['rabbitmq:15692']
      metrics_path: /metrics

    - job_name: postgres
      static_configs:
          - targets: ['postgres_exporter:9187']
